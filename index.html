<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>TriScaner - AI Medical Scan Analysis | Bone, Brain, Kidney & Chest Detection</title>

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="TriScaner is an AI-powered medical imaging platform that detects bone fractures, brain tumors, kidney stones, chest diseases and more with high accuracy."
    />

    <!-- Keywords (less important but still ok) -->
    <meta
      name="keywords"
      content="AI medical scan, bone fracture detection, brain tumor detection, kidney stone AI, chest cancer detection, X-ray AI, CT scan analysis, medical diagnosis AI"
    />

    <!-- Author -->
    <meta name="author" content="TriScaner Team" />

    <!-- Favicon -->
    <link rel="icon" href="/icon.png" />
    <link rel="shortcut icon" href="/icon.png" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="TriScaner - AI Medical Scan Analysis" />
    <meta
      property="og:description"
      content="Upload scans and get AI-based detection for bone, brain, kidney and chest diseases instantly."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://triscaner-ai.vercel.app/" />
    <meta property="og:image" content="/icon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TriScaner - AI Medical Scan Analysis" />
    <meta
      name="twitter:description"
      content="AI-powered platform for detecting fractures, tumors, kidney stones and chest diseases."
    />
    <meta name="twitter:image" content="/icon.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://triscaner-ai.vercel.app/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme Color (Mobile Chrome UI) -->
    <meta name="theme-color" content="#0f172a" />

   

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
